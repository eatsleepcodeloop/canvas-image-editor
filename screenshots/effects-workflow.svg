  <text x="170" y="914" fill="#132E38" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700">Blur and pixelate workflow</text>
  <text x="170" y="952" fill="#476068" font-family="'Segoe UI', Arial, sans-serif" font-size="22">SVG wrapper built from the real PNG capture for alternate README or asset usage.</text>
